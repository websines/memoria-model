[project]
name = "memoria"
version = "0.1.0"
description = "A self-evolving neural architecture with persistent cognitive state"
requires-python = ">=3.11"
dependencies = [
    "torch>=2.4",
    "datasets>=3.0",
    "tokenizers>=0.20",
    "transformers>=4.51",
    "huggingface-hub>=0.25",
    "torch-geometric>=2.6",
    "wandb",
    "numpy",
    "pyyaml",
    "pytest",
    "python-dotenv",
]

[project.optional-dependencies]
bp = ["torch-bp @ git+https://github.com/janapavlasek/torch-bp.git"]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["memoria*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
