[project]
name = "memoria"
version = "0.1.0"
description = "A self-evolving neural architecture with persistent cognitive state"
requires-python = ">=3.11"
dependencies = [
    "torch>=2.4",
    "datasets>=3.0",
    "tokenizers>=0.20",
    "transformers>=4.45",
    "wandb",
    "numpy",
    "pyyaml",
    "pytest",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[tool.pytest.ini_options]
testpaths = ["tests"]
